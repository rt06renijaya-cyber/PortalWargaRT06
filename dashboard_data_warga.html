<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard RT 06</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#f5f7fb}

.hero{
  background:linear-gradient(135deg,#0f766e,#134e4a);
  color:white;
  padding:50px 20px;
  border-radius:0 0 30px 30px;
  text-align:center;
}

.card{
  border:none;
  border-radius:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

.table th{font-weight:600;color:#555}

.action-btn{
  border:none;
  background:none;
  font-size:16px;
  cursor:pointer;
  color:#555;
}
.action-btn:hover{color:#0f766e}

.detail-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

.card-mini{
  background:#f9fafb;
  padding:12px;
  border-radius:10px;
  border:1px solid #eee;
}

input.form-control-sm{font-size:13px}
</style>
</head>

<body>

<div class="hero">
  <h2>Sensus Warga RT 06</h2>
  <p style="opacity:.8">Dashboard Data Warga</p>
</div>

<div class="container mt-4">
<div class="card p-3">

<div class="d-flex gap-2 mb-3 flex-wrap">
<input id="search" class="form-control" placeholder="Cari..." style="max-width:250px">

<select id="sort" class="form-select" style="max-width:200px">
<option value="">Urutkan</option>
<option value="nama_asc">Nama A-Z</option>
<option value="nama_desc">Nama Z-A</option>
<option value="id">ID</option>
<option value="alamat">Alamat</option>
</select>
</div>

<div id="table"></div>

</div>
</div>

<!-- DETAIL MODAL -->
<div class="modal fade" id="detailModal">
<div class="modal-dialog modal-lg">
<div class="modal-content">

<div class="modal-header">
<h5>Detail Warga</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body" id="detailBody"></div>

</div>
</div>
</div>

<!-- DELETE MODAL -->
<div class="modal fade" id="deleteModal">
<div class="modal-dialog">
<div class="modal-content text-center p-3">

<h5>Hapus Data</h5>
<p>Tunggu <b id="timer">5</b> detik</p>

<div class="d-flex justify-content-center gap-2 mt-3">
<button id="btnDelete" class="btn btn-dark" disabled>Hapus</button>
<button class="btn btn-light" data-bs-dismiss="modal">Batal</button>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx2v5mgcsoagSYbg0q3tj_k1Z5IXLEH68K9SeRmPIKgyl9LyZpkjTc_o_FNWLM_OLdj9w/exec";

let dataAll=[], headers=[];
let currentData=[], editBuffer=[];

// LOAD DATA
async function load(){
const res = await fetch(WEB_APP_URL);
const json = await res.json();

headers = json.header;
dataAll = json.data;

render();
}

// RENDER TABLE
function render(){
let s=document.getElementById("search").value.toLowerCase();
let sort=document.getElementById("sort").value;

let data=dataAll.filter(r=>r.join(" ").toLowerCase().includes(s));

if(sort==="nama_asc") data.sort((a,b)=>a[3].localeCompare(b[3]));
if(sort==="nama_desc") data.sort((a,b)=>b[3].localeCompare(a[3]));
if(sort==="id") data.sort((a,b)=>a[0].localeCompare(b[0]));
if(sort==="alamat") data.sort((a,b)=>a[1].localeCompare(b[1]));

let html=`<table class="table table-striped">
<thead><tr>
<th>ID</th><th>Nama</th><th>Alamat</th><th>Aksi</th>
</tr></thead><tbody>`;

data.forEach((r,i)=>{
html+=`
<tr>
<td>${r[0]}</td>
<td>${r[3]}</td>
<td>${r[1]}</td>
<td>

<button class="action-btn" onclick="openDetail(${i})">
<i class="fas fa-eye"></i>
</button>

<button class="action-btn" onclick="openDelete('${r[0]}')">
<i class="fas fa-trash"></i>
</button>

</td>
</tr>`;
});

html+="</tbody></table>";
document.getElementById("table").innerHTML=html;
}

// OPEN DETAIL
function openDetail(i){
currentData = [...dataAll[i]];
editBuffer = [...currentData];

renderDetail();
new bootstrap.Modal(detailModal).show();
}

// RENDER DETAIL
function renderDetail(){

let html='<div class="detail-grid">';

editBuffer.forEach((v,i)=>{

html+=`
<div class="card-mini">

<small>${headers[i]}</small>

<div id="field-${i}" style="margin-top:5px">
<b>${v||"-"}</b>
</div>

<button onclick="editField(${i})" class="btn btn-sm btn-light mt-2">
<i class="fas fa-pen"></i>
</button>

</div>`;
});

html+='</div>';

document.getElementById("detailBody").innerHTML=html;
}

// EDIT FIELD
function editField(i){

const val = editBuffer[i] || "";

document.getElementById(`field-${i}`).innerHTML = `
<input id="input-${i}" class="form-control form-control-sm" value="${val}">
<div class="d-flex gap-1 mt-1">
<button class="btn btn-success btn-sm" onclick="saveField(${i})">✔</button>
<button class="btn btn-light btn-sm" onclick="cancelField(${i})">✖</button>
</div>
`;
}

// SAVE FIELD
async function saveField(i){

const val = document.getElementById(`input-${i}`).value;
editBuffer[i] = val;

try{
await fetch(WEB_APP_URL,{
method:"POST",
body: JSON.stringify({
action:"update",
id: editBuffer[0],
values: editBuffer
})
});

showToast("Data berhasil diupdate");

await load();

// refresh detail biar tetap kebuka
currentData = [...editBuffer];
renderDetail();

}catch(e){
showToast("Gagal update");
}
}

// CANCEL
function cancelField(i){
renderDetail();
}

// DELETE
function openDelete(id){

const modal = new bootstrap.Modal(deleteModal);
modal.show();

let t=5;
const btn=document.getElementById("btnDelete");
btn.disabled=true;
document.getElementById("timer").innerText=t;

const interval=setInterval(()=>{
t--;
document.getElementById("timer").innerText=t;

if(t===0){
clearInterval(interval);
btn.disabled=false;
}
},1000);

btn.onclick = async ()=>{
await fetch(WEB_APP_URL,{
method:"POST",
body: JSON.stringify({action:"delete",id})
});
modal.hide();
load();
showToast("Data dihapus");
};
}

// TOAST
function showToast(msg){
const t=document.createElement("div");
t.innerText=msg;
t.style=`
position:fixed;
bottom:20px;
right:20px;
background:#111;
color:#fff;
padding:10px 15px;
border-radius:8px;
z-index:9999;
opacity:0;
transition:.3s`;
document.body.appendChild(t);

setTimeout(()=>t.style.opacity=1,100);
setTimeout(()=>{
t.style.opacity=0;
setTimeout(()=>t.remove(),300);
},2000);
}

// EVENT
document.getElementById("search").addEventListener("input",render);
document.getElementById("sort").addEventListener("change",render);

// INIT
load();

</script>

</body>
</html>
