<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin RT 06</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins';
    background:#f4f7f6;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.header{
    font-weight:700;
    color:#00796B;
}

.table thead{
    background:#00796B;
    color:white;
    position:sticky;
    top:0;
}

.btn-primary-custom{
    background:#00796B;
    color:white;
}

.btn-primary-custom:hover{
    background:#26A69A;
}

.modal-header{
    background:linear-gradient(135deg,#00796B,#26A69A);
    color:white;
}

.grid-detail{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.detail-card{
    background:#f9fafb;
    padding:15px;
    border-radius:10px;
    border:1px solid #e5e7eb;
}

.pagination-btn{
    cursor:pointer;
    margin:5px;
}

</style>
</head>

<body>

<div class="container my-4">

<h3 class="header mb-3"><i class="fas fa-database"></i> Dashboard Warga RT 06</h3>

<div class="card p-3">

<div class="d-flex flex-wrap gap-2 mb-3">

<input type="text" id="search" class="form-control" placeholder="Cari nama / NIK..." style="max-width:250px">

<select id="sort" class="form-select" style="max-width:200px">
<option value="">Sort</option>
<option value="nama">Nama A-Z</option>
<option value="alamat">Alamat</option>
<option value="id">ID</option>
</select>

</div>

<div id="tableContainer">Loading...</div>

<div class="d-flex justify-content-between mt-3">
<button class="btn btn-secondary" onclick="prevPage()">Prev</button>
<span id="pageInfo"></span>
<button class="btn btn-secondary" onclick="nextPage()">Next</button>
</div>

</div>
</div>

<!-- MODAL DETAIL -->
<div class="modal fade" id="detailModal">
<div class="modal-dialog modal-lg">
<div class="modal-content">
<div class="modal-header">
<h5>Detail Warga</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body" id="detailBody"></div>
</div>
</div>
</div>

<!-- MODAL DELETE -->
<div class="modal fade" id="deleteModal">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header bg-danger text-white">
<h5>Konfirmasi Hapus</h5>
</div>
<div class="modal-body text-center">
<p>Tunggu <span id="countdown">5</span> detik untuk konfirmasi</p>
<button id="confirmDelete" class="btn btn-danger" disabled>Hapus</button>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

const URL = "https://script.google.com/macros/s/AKfycbx2v5mgcsoagSYbg0q3tj_k1Z5IXLEH68K9SeRmPIKgyl9LyZpkjTc_o_FNWLM_OLdj9w/exec";

let allData = [];
let headers = [];
let currentPage = 1;
let perPage = 20;
let deleteId = null;

// LOAD DATA
async function loadData(){
    const res = await fetch(URL);
    const json = await res.json();

    headers = json.header;
    allData = json.data;

    renderTable();
}

function renderTable(){

    let search = document.getElementById("search").value.toLowerCase();

    let filtered = allData.filter(r =>
        r.join(" ").toLowerCase().includes(search)
    );

    let sort = document.getElementById("sort").value;

    if(sort==="nama") filtered.sort((a,b)=>a[3].localeCompare(b[3]));
    if(sort==="alamat") filtered.sort((a,b)=>a[1].localeCompare(b[1]));
    if(sort==="id") filtered.sort((a,b)=>a[0].localeCompare(b[0]));

    let start = (currentPage-1)*perPage;
    let pageData = filtered.slice(start,start+perPage);

    let html = `<div class="table-responsive"><table class="table table-striped">`;

    html += "<thead><tr><th>ID</th><th>Nama</th><th>NIK</th><th>Alamat</th><th>Aksi</th></tr></thead><tbody>";

    pageData.forEach((row,i)=>{

        html += `
        <tr>
        <td>${row[0]}</td>
        <td>${row[3]}</td>
        <td>${row[4]}</td>
        <td>${row[1]}</td>
        <td>
        <button class="btn btn-sm btn-primary" onclick="showDetail(${start+i})"><i class="fas fa-eye"></i></button>
        <button class="btn btn-sm btn-danger" onclick="openDelete('${row[0]}')"><i class="fas fa-trash"></i></button>
        </td>
        </tr>
        `;
    });

    html += "</tbody></table></div>";

    document.getElementById("tableContainer").innerHTML = html;

    document.getElementById("pageInfo").innerText = `Page ${currentPage}`;
}

// DETAIL VIEW PREMIUM
function showDetail(index){

    let data = allData[index];

    let html = `<div class="grid-detail">`;

    data.forEach((val,i)=>{
        let label = headers[i] || `Field ${i+1}`;
        let value = val || "-";

        if(typeof value === "string" && value.includes("http")){
            value = `<a href="${value}" target="_blank">Lihat File</a>`;
        }

        html += `
        <div class="detail-card">
        <div style="font-size:12px;color:#6b7280">${label}</div>
        <div style="font-weight:600">${value}</div>
        </div>`;
    });

    html += "</div>";

    document.getElementById("detailBody").innerHTML = html;

    new bootstrap.Modal(document.getElementById("detailModal")).show();
}

// DELETE SYSTEM DELAY
function openDelete(id){

    deleteId = id;
    let modal = new bootstrap.Modal(document.getElementById("deleteModal"));
    modal.show();

    let count = 5;
    let btn = document.getElementById("confirmDelete");

    btn.disabled = true;

    let interval = setInterval(()=>{
        count--;
        document.getElementById("countdown").innerText = count;

        if(count===0){
            clearInterval(interval);
            btn.disabled = false;
        }
    },1000);

    btn.onclick = deleteData;
}

async function deleteData(){

    await fetch(URL,{
        method:"POST",
        body:JSON.stringify({action:"delete",id:deleteId})
    });

    location.reload();
}

// PAGINATION
function nextPage(){ currentPage++; renderTable(); }
function prevPage(){ if(currentPage>1) currentPage--; renderTable(); }

// EVENT
document.getElementById("search").addEventListener("input",()=>{currentPage=1;renderTable();});
document.getElementById("sort").addEventListener("change",renderTable);

// INIT
loadData();

</script>

</body>
</html>
