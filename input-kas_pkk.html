<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kas PKK</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#0f766e;
  --primary-dark:#064e3b;
  --bg:#f1f5f9;
}

body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  margin:0;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--primary-dark),var(--primary));
  color:white;
  padding:20px 15px 60px;
  text-align:center;
  border-bottom-left-radius:30px;
  border-bottom-right-radius:30px;
}

.header img{
  width:60px;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:-40px auto 20px;
  background:white;
  padding:18px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* INPUT */
input,select{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:15px;
  box-sizing:border-box;
}

/* BUTTON */
button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:50px;
  color:white;
  font-weight:600;
  cursor:pointer;
  font-size:15px;
}

.btn-save{
  background:linear-gradient(135deg,#16a34a,#22c55e);
}

.btn-approve{
  background:linear-gradient(135deg,#f59e0b,#f97316);
  margin-top:10px;
}

/* MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:flex-end; /* 🔥 dari bawah kayak app */
  z-index:999;
}

.modal-overlay.show{display:flex;}

.modal-box{
  background:white;
  border-radius:20px 20px 0 0;
  padding:20px;
  width:100%;
  max-width:500px;
  animation:slideUp .3s ease;
}

@keyframes slideUp{
  from{transform:translateY(100%);}
  to{transform:translateY(0);}
}

.modal-body{
  background:#f8fafc;
  padding:12px;
  border-radius:10px;
  font-size:14px;
  max-height:250px;
  overflow:auto;
}

.modal-actions{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.btn-cancel{
  flex:1;
  background:#e5e7eb;
  color:black;
}

.btn-green{
  flex:1;
  background:var(--primary);
}

.spinner{
  border:4px solid #eee;
  border-top:4px solid var(--primary);
  border-radius:50%;
  width:45px;height:45px;
  margin:15px auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg)}}

.checkmark{
  font-size:45px;
  color:#16a34a;
  text-align:center;
}

/* 📱 MOBILE IMPROVEMENT */
@media(max-width:480px){

  .container{
    margin:-35px 10px 20px;
    padding:15px;
  }

  input,select{
    padding:16px;
    font-size:16px; /* biar ga zoom iOS */
  }

  button{
    padding:16px;
    font-size:16px;
  }
}
</style>
</head>

<body>

<div class="header">
  <img src="logo_rt06.png">
  <h2>Kas PKK</h2>
</div>

<div class="container">

  <input type="date" id="tanggal">

  <select id="kategori" onchange="handleKategori()">
    <option value="">Pilih Kategori</option>
    <option>Saldo Awal</option>
    <option>Iuran PKK</option>
    <option>Donasi</option>
    <option>Bansos</option>
    <option>Kegiatan</option>
    <option>Lainnya</option>
  </select>

  <select id="jenis">
    <option value="Pemasukan">Pemasukan</option>
    <option value="Pengeluaran">Pengeluaran</option>
  </select>

  <select id="koordinator">
    <option value="">Pilih Koordinator</option>
    <option>Koordinator Ibu Rasikun</option>
    <option>Koordinator Ibu Made</option>
    <option>Koordinator Ibu Tanti</option>
    <option>Koordinator Ibu Nurhasan</option>
    <option>Koordinator Ibu Maryati</option>
    <option>Koordinator Ibu Eko</option>
    <option>Koordinator Ibu Sachri</option>
    <option>Koordinator Ibu Idham</option>
    <option>Koordinator Ibu Umi</option>
    <option>Koordinator Ibu Slamet</option>
    <option>Koordinator Ibu Abdullah</option>
    <option>Koordinator Bpk. Chamzah</option>
  </select>

  <input type="text" id="keterangan" placeholder="Keterangan">
  <input type="number" id="nominal" placeholder="Nominal">

  <button class="btn-save" onclick="submitData()">Simpan</button>
  <button class="btn-approve" onclick="submitApproval()">Ajukan Approval</button>

</div>

<!-- MODAL -->
<div id="modal" class="modal-overlay">
  <div class="modal-box">
    <div id="content"></div>
  </div>
</div>

<script>
const ENDPOINT = "https://script.google.com/macros/s/AKfycbxlADmaE0i7EFaXFIGZlS242IDucuOnlYesRYPL0vd-VexWKAZrdKwZVo198Wt2DZh2/exec";

let tempData = {};

// AUTO KETERANGAN
function handleKategori(){
  const kategori = document.getElementById("kategori").value;
  const tanggal = document.getElementById("tanggal").value;

  if(kategori === "Iuran PKK" && tanggal){
    const bulan = new Date(tanggal).toLocaleString('id-ID',{month:'long'});
    document.getElementById("keterangan").value = "Iuran PKK " + bulan;
    document.getElementById("keterangan").readOnly = true;
  } else {
    document.getElementById("keterangan").value = "";
    document.getElementById("keterangan").readOnly = false;
  }
}

// SIMPAN
function submitData(){
  tempData = {
    action:"transaksi",
    Tanggal:document.getElementById('tanggal').value.split('-').reverse().join('/'),
    Koordinator:document.getElementById('koordinator').value,
    Jenis:document.getElementById('jenis').value,
    Kategori:document.getElementById('kategori').value,
    Keterangan:document.getElementById('keterangan').value,
    Nominal:document.getElementById('nominal').value
  };

  showModalPreview();
}

function showModalPreview(){
  document.getElementById('modal').classList.add('show');

  document.getElementById('content').innerHTML = `
    <h3>Konfirmasi</h3>
    <div class="modal-body">
      ${tempData.Tanggal}<br>
      ${tempData.Jenis}<br>
      ${tempData.Keterangan}<br>
      Rp ${Number(tempData.Nominal).toLocaleString('id-ID')}
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-green" onclick="confirm()">Simpan</button>
    </div>
  `;
}

async function confirm(){
  document.getElementById('content').innerHTML = `<div class="spinner"></div>`;

  await fetch(ENDPOINT,{
    method:'POST',
    mode:'no-cors',
    body:JSON.stringify(tempData)
  });

  document.getElementById('content').innerHTML = `
    <div class="checkmark">✔</div>
    <h3>Berhasil</h3>
    <button class="btn-green" onclick="afterSuccess()">Tutup</button>
  `;
}

// PREVIEW APPROVAL
async function submitApproval(){

  document.getElementById('modal').classList.add('show');

  document.getElementById('content').innerHTML = `
    <div class="spinner"></div>
    <p>Memuat preview...</p>
  `;

  const res = await fetch(`${ENDPOINT}?action=getDetailDraft`);
  const data = await res.json();

  if(!data.length){
    document.getElementById('content').innerHTML = `<p>Tidak ada data draft</p>`;
    return;
  }

  let html = "";
  let total = 0;

  data.forEach(d=>{
    total += d.nominal;
    html += `<div>• ${d.jenis} - Rp ${d.nominal.toLocaleString('id-ID')}</div>`;
  });

  document.getElementById('content').innerHTML = `
    <h3>Preview Approval</h3>
    <div class="modal-body">
      ${html}
      <hr>
      <b>Total: Rp ${total.toLocaleString('id-ID')}</b>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-green" onclick="confirmApproval()">Kirim</button>
    </div>
  `;
}

async function confirmApproval(){

  document.getElementById('content').innerHTML = `<div class="spinner"></div>`;

  await fetch(ENDPOINT,{
    method:'POST',
    mode:'no-cors',
    body:JSON.stringify({
      action:"approval",
      Bendahara:"Bendahara PKK"
    })
  });

  document.getElementById('content').innerHTML = `
    <div class="checkmark">✔</div>
    <h3>Berhasil Diajukan</h3>
    <button class="btn-green" onclick="afterSuccess()">Tutup</button>
  `;
}

function afterSuccess(){
  closeModal();
  location.reload();
}

function closeModal(){
  document.getElementById('modal').classList.remove('show');
}

const bulanNama = [
  "Januari","Februari","Maret","April","Mei","Juni",
  "Juli","Agustus","September","Oktober","November","Desember"
];

// trigger saat kategori / tanggal berubah
document.getElementById("kategori").addEventListener("change", autoKeterangan);
document.getElementById("tanggal").addEventListener("change", autoKeterangan);

function autoKeterangan(){
  const kategori = document.getElementById("kategori").value;
  const tanggal = document.getElementById("tanggal").value;
  const ket = document.getElementById("keterangan");

  if(kategori === "Iuran PKK" && tanggal){
    const tgl = new Date(tanggal);

    const bulan = bulanNama[tgl.getMonth()];
    const tahun = tgl.getFullYear();

    ket.value = `Iuran Bulan ${bulan} ${tahun}`;
    ket.readOnly = true;
    ket.style.background = "#e5e7eb";
  } else {
    ket.readOnly = false;
    ket.value = "";
    ket.style.background = "white";
  }
}
</script>

</body>
</html>
