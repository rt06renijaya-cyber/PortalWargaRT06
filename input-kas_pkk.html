<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kas PKK</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#0f766e;
  --primary-dark:#064e3b;
  --bg:#f1f5f9;
}

body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  margin:0;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--primary-dark),var(--primary));
  color:white;
  padding:20px 15px 65px;
  text-align:center;
  border-radius:0 0 25px 25px;
}

.header img{ width:60px; }

/* CONTAINER */
.container{
  max-width:520px;
  margin:-45px auto 20px;
  background:white;
  padding:18px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

/* INPUT */
input,select{
  width:100%;
  padding:15px;
  margin-bottom:14px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
  box-sizing:border-box;
}

select:disabled,input:disabled{
  background:#e5e7eb;
  color:#888;
}

/* BUTTON */
button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:50px;
  color:white;
  font-weight:600;
}

.btn-save{ background:linear-gradient(135deg,#22c55e,#16a34a); }
.btn-approve{
  background:linear-gradient(135deg,#f59e0b,#f97316);
  margin-top:10px;
}

/* MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:flex-end;
  z-index:999;
}
.modal-overlay.show{ display:flex; }

.modal-box{
  background:white;
  border-radius:20px 20px 0 0;
  padding:20px;
  width:100%;
  max-width:520px;
  animation:slideUp .25s ease;
}

@keyframes slideUp{
  from{transform:translateY(100%)}
  to{transform:translateY(0)}
}

.modal-body{
  background:#f8fafc;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
}

.modal-actions{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.btn-cancel{
  flex:1;
  background:#e5e7eb;
  color:black;
}

.btn-green{
  flex:1;
  background:var(--primary);
}

/* spinner */
.spinner{
  border:4px solid #eee;
  border-top:4px solid var(--primary);
  border-radius:50%;
  width:40px;height:40px;
  margin:15px auto;
  animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg)}}

.checkmark{
  text-align:center;
  font-size:45px;
  color:green;
}

/* MOBILE */
@media(max-width:480px){
  .container{
    margin:-40px 10px 20px;
    padding:15px;
  }
}
</style>
</head>

<body>

<div class="header">
  <img src="logo_rt06.png">
  <h2>Input Laporan Kas PKK</h2>
</div>

<div class="container">

  <!-- 1 -->
  <select id="bendahara" onchange="stepBendahara()">
    <option value="">Pilih Bendahara</option>
    <option>Ibu Tanti</option>
    <option>Ibu Yani</option>
  </select>

  <!-- 2 -->
  <input type="date" id="tanggal" disabled>

  <!-- 3 -->
  <select id="kategori" onchange="handleKategori()" disabled>
    <option value="">Kategori</option>
    <option>Saldo Awal</option>
    <option>Iuran PKK</option>
    <option>Donasi</option>
    <option>Bansos</option>
    <option>Kegiatan</option>
    <option>Lainnya</option>
  </select>

  <!-- 4 -->
  <select id="jenis" disabled>
    <option value="">Pilih Jenis</option>
    <option value="Pemasukan">Pemasukan</option>
    <option value="Pengeluaran">Pengeluaran</option>
  </select>

  <!-- 5 -->
  <select id="koordinator" style="display:none;">
    <option value="">Pilih Koordinator</option>
    <option>Koordinator Ibu Rasikun</option>
    <option>Koordinator Ibu Made</option>
    <option>Koordinator Ibu Tanti</option>
    <option>Koordinator Ibu Nurhasan</option>
    <option>Koordinator Ibu Maryati</option>
    <option>Koordinator Ibu Eko</option>
    <option>Koordinator Ibu Sachri</option>
    <option>Koordinator Ibu Idham</option>
    <option>Koordinator Ibu Umi</option>
    <option>Koordinator Ibu Slamet</option>
    <option>Koordinator Ibu Abdullah</option>
    <option>Koordinator Bpk. Chamzah</option>
  </select>

  <!-- 6 -->
  <input type="text" id="keterangan" placeholder="Keterangan" disabled>

  <!-- 7 -->
  <input type="number" id="nominal" placeholder="Nominal" disabled>

  <button class="btn-save" onclick="submitData()">Simpan</button>
  <button class="btn-approve" onclick="submitApproval()">Ajukan Approval</button>

</div>

<!-- MODAL -->
<div id="modal" class="modal-overlay">
  <div class="modal-box">
    <div id="content"></div>
  </div>
</div>

<script>
const ENDPOINT = "https://script.google.com/macros/s/AKfycbxlADmaE0i7EFaXFIGZlS242IDucuOnlYesRYPL0vd-VexWKAZrdKwZVo198Wt2DZh2/exec";

let tempData = {};

// STEP FLOW
function stepBendahara(){
  if(val("bendahara")){
    enable("tanggal");
  }
}

document.getElementById("tanggal").addEventListener("change", function(){
  if(this.value){
    enable("kategori");
  }
});

function handleKategori(){
  const kategori = val("kategori");

  if(kategori){
    enable("jenis");
    enable("keterangan");
    enable("nominal");
  }

  if(kategori === "Iuran PKK"){
    show("koordinator");
    autoKeterangan();
  }else{
    hide("koordinator");
    setVal("keterangan","");
    document.getElementById("keterangan").readOnly = false;
  }
}

// AUTO KETERANGAN
const bulanNama = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];

function autoKeterangan(){
  const tgl = val("tanggal");
  if(!tgl) return;

  const d = new Date(tgl);
  setVal("keterangan",`Iuran PKK ${bulanNama[d.getMonth()]} ${d.getFullYear()}`);
  document.getElementById("keterangan").readOnly = true;
}

// SUBMIT
function submitData(){

  if(!val("bendahara")) return alertModal("Bendahara wajib dipilih");
  if(!val("tanggal")) return alertModal("Tanggal wajib dipilih");
  if(!val("kategori")) return alertModal("Kategori wajib dipilih");
  if(!val("jenis")) return alertModal("Jenis wajib dipilih");
  if(!val("nominal")) return alertModal("Nominal wajib diisi");

  let ket = val("keterangan");

  if(val("kategori") === "Iuran PKK"){
    ket = `${val("koordinator")} - ${ket}`;
  }

  tempData = {
    action:"transaksi",
    Tanggal:formatTanggal(),
    Jenis:val("jenis"),
    Kategori:val("kategori"),
    Keterangan:ket,
    Nominal:val("nominal")
  };

  showModal(`
    <h3>Konfirmasi</h3>
    <div class="modal-body">
      ${tempData.Tanggal}<br>
      ${tempData.Keterangan}<br>
      Rp ${Number(tempData.Nominal||0).toLocaleString('id-ID')}
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-green" onclick="confirm()">Simpan</button>
    </div>
  `);
}

async function confirm(){
  showLoading("Menyimpan...");
  await fetch(ENDPOINT,{
    method:'POST',
    mode:'no-cors',
    body:JSON.stringify(tempData)
  });
  showSuccess("Data tersimpan");
}

// APPROVAL (TIDAK DIUBAH)
async function submitApproval(){
  showLoading("Memuat data...");

  const res = await fetch(`${ENDPOINT}?action=getDetailDraft`);
  const data = await res.json();

  if(!data.length){
    showModal("<p>Tidak ada data draft</p>");
    return;
  }

  let total = 0;
  let html = "";

  data.forEach(d=>{
    total += d.nominal;
    html += `<div>• ${d.jenis} - Rp ${d.nominal.toLocaleString('id-ID')}</div>`;
  });

  showModal(`
    <h3>Preview Approval</h3>
    <div class="modal-body">
      ${html}
      <hr>
      <b>Total: Rp ${total.toLocaleString('id-ID')}</b>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-green" onclick="confirmApproval()">Kirim</button>
    </div>
  `);
}

async function confirmApproval(){
  showLoading("Mengirim...");
  await fetch(ENDPOINT,{
    method:'POST',
    mode:'no-cors',
    body:JSON.stringify({action:"approval"})
  });
  showSuccess("Approval berhasil dikirim");
}

// HELPER
function val(id){ return document.getElementById(id).value; }
function setVal(id,v){ document.getElementById(id).value = v; }
function enable(id){ document.getElementById(id).disabled = false; }
function show(id){ document.getElementById(id).style.display = "block"; }
function hide(id){ document.getElementById(id).style.display = "none"; }

function alertModal(msg){
  showModal(`
    <h3>Oops</h3>
    <div class="modal-body">${msg}</div>
    <div class="modal-actions">
      <button class="btn-green" onclick="closeModal()">OK</button>
    </div>
  `);
}

function showModal(html){
  document.getElementById('modal').classList.add('show');
  document.getElementById('content').innerHTML = html;
}

function showLoading(text){
  showModal(`<div class="spinner"></div><p>${text}</p>`);
}

function showSuccess(text){
  showModal(`
    <div class="checkmark">✔</div>
    <h3>${text}</h3>
    <button class="btn-green" onclick="afterSuccess()">Tutup</button>
  `);
}

function closeModal(){
  document.getElementById('modal').classList.remove('show');
}

function afterSuccess(){
  closeModal();
  location.reload();
}

function formatTanggal(){
  return val("tanggal").split('-').reverse().join('/');
}
</script>

</body>
</html>
