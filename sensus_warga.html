<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensus Warga RT 06</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:Poppins;
  margin:0;
  background:#f4f7fb;
}

.header{
  background:linear-gradient(135deg,#1e88e5,#1565c0);
  color:white;
  text-align:center;
  padding:40px 20px;
}

.container{
  max-width:800px;
  margin:-40px auto 40px;
  padding:0 15px;
}

.card{
  background:white;
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input,select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ddd;
  box-sizing:border-box;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
}

button{
  width:100%;
  padding:15px;
  background:#1565c0;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}

.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.active{display:flex;}

.modal-box{
  background:white;
  padding:30px;
  border-radius:12px;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <h1>Sensus Warga RT 06</h1>
  <p>Berbasis Kartu Keluarga</p>
</div>

<div class="container">

<form id="form">

<div class="card">
<h3>Data Rumah</h3>

<div class="grid">
<input placeholder="Blok" id="blok" required>
<input placeholder="No Rumah" id="noRumah" required>
</div>

<input placeholder="Alamat" id="alamat" required>
<input placeholder="No KK" id="kk" required>

<select id="tinggal">
<option value="Milik">Milik</option>
<option value="Kontrak">Kontrak</option>
</select>

<input type="file" id="kkFile">

</div>

<div class="card">
<h3>Kepala Keluarga</h3>

<input placeholder="Nama" id="nama">
<input placeholder="NIK" id="nik">

<select id="jk">
<option>Laki-laki</option>
<option>Perempuan</option>
</select>

<input placeholder="No HP" id="hp">

<input placeholder="Tempat Lahir" id="tempat">
<input type="date" id="tgl">

<input placeholder="Pekerjaan" id="pekerjaan">

<select id="agama">
<option>Islam</option>
<option>Kristen</option>
</select>

</div>

<button type="submit">Kirim Data</button>

</form>

</div>

<div id="modal" class="modal">
<div class="modal-box">
<h2>Berhasil ✅</h2>
<p>Data tersimpan</p>
<button onclick="closeModal()">OK</button>
</div>
</div>

<script>
const URL = "ISI_URL_APPS_SCRIPT_KAMU";

function toBase64(file){
 return new Promise((res)=>{
  const reader=new FileReader();
  reader.onload=()=>res(reader.result.split(',')[1]);
  reader.readAsDataURL(file);
 });
}

document.getElementById("form").addEventListener("submit", async e=>{
 e.preventDefault();

 const kkFile = document.getElementById("kkFile").files[0];

 let kkBase64 = "";
 if(kkFile) kkBase64 = await toBase64(kkFile);

 const data = [{
  blok:blok.value,
  noRumah:noRumah.value,
  alamat:alamat.value,
  kk:kk.value,
  nama:nama.value,
  nik:nik.value,
  jk:jk.value,
  hp:hp.value,
  tempat:tempat.value,
  tgl:tgl.value,
  pekerjaan:pekerjaan.value,
  agama:agama.value,
  hubungan:"Kepala Keluarga",
  pendidikan:"",
  tinggal:tinggal.value,
  kkFile:kkBase64,
  anggotaKe:1,
  kkKe:1
 }];

 await fetch(URL,{
  method:"POST",
  body:JSON.stringify(data)
 });

 document.getElementById("modal").classList.add("active");
 form.reset();
});

function closeModal(){
 document.getElementById("modal").classList.remove("active");
}
</script>

</body>
</html>
