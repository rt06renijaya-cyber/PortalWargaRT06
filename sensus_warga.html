<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensus Warga RT 06</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f4f7fb;
}

/* HEADER */
.header{
background:linear-gradient(135deg,#0056b3,#007bff);
color:white;
text-align:center;
padding:50px 20px 80px;
}

/* CONTAINER */
.container{
max-width:700px;
margin:-60px auto 40px;
padding:0 15px;
}

/* CARD */
.card{
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
}

/* GRID */
.grid{display:grid;gap:12px;margin-top:10px;}
.grid-2{grid-template-columns:1fr 1fr;}
@media(max-width:600px){.grid-2{grid-template-columns:1fr;}}

/* INPUT */
input,select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
}

/* MEMBER */
.member{
border:1px solid #eee;
padding:15px;
border-radius:12px;
margin-top:15px;
background:#fafafa;
}

/* BUTTON */
.btn{
width:100%;
padding:14px;
border:none;
border-radius:30px;
font-weight:600;
cursor:pointer;
}

.btn-primary{background:#007bff;color:white}
.btn-outline{background:white;border:1px dashed #ccc}

/* PREVIEW */
.preview img{
max-width:100px;
margin-top:10px;
border-radius:6px;
}

/* LOADING */
#loading{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
color:white;
z-index:999;
}
</style>
</head>

<body>

<div id="loading">Mengirim Data...</div>

<div class="header">
<h2>Sensus Warga RT 06</h2>
<p>Pendataan berbasis Kartu Keluarga</p>
</div>

<div class="container">

<div class="card">
<h3>Data Rumah / KK</h3>

<div class="grid grid-2">
<input id="blok" placeholder="Blok">
<input id="noRumah" placeholder="No Rumah">
</div>

<div class="grid">
<input id="alamat" placeholder="Alamat Lengkap">
<input id="kk" placeholder="Nomor KK">
</div>

<div class="grid grid-2">
<select id="tinggal">
<option>Milik</option>
<option>Kontrak</option>
<option>Kost</option>
</select>
<input type="file" id="kkFile">
</div>

<div id="kkPreview" class="preview"></div>

</div>

<div class="card">
<h3>Anggota Keluarga</h3>

<div id="anggota"></div>

<button class="btn btn-outline" onclick="addMember()">
+ Tambah Anggota
</button>

</div>

<button class="btn btn-primary" type="button" onclick="submitData()">
Kirim Data
</button>

</div>

<script>
const URL="https://script.google.com/macros/s/AKfycbx2v5mgcsoagSYbg0q3tj_k1Z5IXLEH68K9SeRmPIKgyl9LyZpkjTc_o_FNWLM_OLdj9w/exec";

/* TAMBAH ANGGOTA */
function addMember(){
let i=document.getElementById("anggota").children.length+1;

let html=`
<div class="member">
<h4>${i===1?"Kepala Keluarga":"Anggota "+i}</h4>

<div class="grid">
<input id="nama_${i}" placeholder="Nama">
<input id="nik_${i}" placeholder="NIK">
</div>

<div class="grid grid-2">
<select id="jk_${i}">
<option>Laki-laki</option>
<option>Perempuan</option>
</select>
${i===1?'<input id="hp_1" placeholder="No HP">':""}
</div>

<div class="grid grid-2">
<input id="tempat_${i}" placeholder="Tempat Lahir">
<input type="date" id="tgl_${i}">
</div>

<div class="grid grid-2">
<select id="status_${i}">
<option>Belum Kawin</option>
<option>Kawin</option>
</select>

<select id="agama_${i}">
<option>Islam</option>
<option>Kristen</option>
<option>Katolik</option>
</select>
</div>

<input id="kerja_${i}" placeholder="Pekerjaan">

<input type="file" id="ktp_${i}">
<div id="prev_${i}" class="preview"></div>

</div>
`;

document.getElementById("anggota").insertAdjacentHTML("beforeend",html);

// preview
document.getElementById(`ktp_${i}`).onchange=e=>{
let f=e.target.files[0];
if(!f)return;
let r=new FileReader();
r.onload=ev=>document.getElementById(`prev_${i}`).innerHTML=`<img src="${ev.target.result}">`;
r.readAsDataURL(f);
};
}

/* PREVIEW KK */
kkFile.onchange=e=>{
let f=e.target.files[0];
if(!f)return;
let r=new FileReader();
r.onload=ev=>kkPreview.innerHTML=`<img src="${ev.target.result}">`;
r.readAsDataURL(f);
};

function toBase64(file){
return new Promise(res=>{
if(!file)return res(null);
let r=new FileReader();
r.onload=()=>res(r.result.split(',')[1]);
r.readAsDataURL(file);
});
}

/* SUBMIT */
async function submitData(){

let loading=document.getElementById("loading");
loading.style.display="flex";

try{

let anggota=document.getElementById("anggota").children;
let kk64=await toBase64(kkFile.files[0]);
let hp=document.getElementById("hp_1")?.value || "";

let data=[];

for(let i=0;i<anggota.length;i++){
let idx=i+1;

let nik=document.getElementById(`nik_${idx}`).value;
if(nik.length!==16){
alert("NIK harus 16 digit");
loading.style.display="none";
return;
}

let ktp64=await toBase64(document.getElementById(`ktp_${idx}`).files[0]);

data.push({
alamat:alamat.value,
blok:blok.value,
noRumah:noRumah.value,
kk:kk.value,
hp:hp,
tinggal:tinggal.value,
nama:document.getElementById(`nama_${idx}`).value,
nik:nik,
jk:document.getElementById(`jk_${idx}`).value,
status:document.getElementById(`status_${idx}`).value,
agama:document.getElementById(`agama_${idx}`).value,
tempat:document.getElementById(`tempat_${idx}`).value,
tgl:document.getElementById(`tgl_${idx}`).value,
pekerjaan:document.getElementById(`kerja_${idx}`).value,
kkKe:1,
anggotaKe:idx,
ktp:ktp64,
kkFile:kk64
});
}

await fetch(URL,{method:"POST",body:JSON.stringify(data)});

alert("Berhasil!");
location.reload();

}catch(err){
alert("Error kirim data");
console.error(err);
}

loading.style.display="none";
}

window.onload=()=>addMember();
</script>

</body>
</html>
