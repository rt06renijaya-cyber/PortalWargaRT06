<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pendataan Warga RT 06</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>
:root{
--primary:#0f766e;
--bg:#f4f7fb;
--card:#ffffff;
--border:#e5e7eb;
}

body{
font-family:'Poppins',sans-serif;
background:var(--bg);
margin:0;
}

/* HEADER */
.header{
background:linear-gradient(135deg,#0f766e,#134e4a);
color:white;
padding:40px 20px;
text-align:center;
border-radius:0 0 25px 25px;
}

/* LAYOUT */
.container{
max-width:850px;
margin:auto;
padding:20px;
}

.card{
background:var(--card);
padding:25px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,.05);
margin-bottom:20px;
}

.section-title{
font-weight:600;
margin-bottom:15px;
}

.form-group{margin-bottom:16px;}

label{
font-size:13px;
font-weight:500;
display:block;
margin-bottom:6px;
}

input,select{
width:100%;
padding:11px;
border-radius:8px;
border:1px solid var(--border);
font-size:14px;
}

/* ANGGOTA */
.anggota{
border:1px solid var(--border);
border-radius:12px;
padding:18px;
margin-top:15px;
background:#fafafa;
}

.anggota h4{
margin:0 0 12px;
font-size:15px;
color:#0f766e;
}

/* BUTTON */
.btn{
background:var(--primary);
color:white;
border:none;
padding:13px;
border-radius:10px;
width:100%;
cursor:pointer;
font-weight:500;
}

.btn-add{
background:#e6fffa;
color:#0f766e;
border:1px dashed #0f766e;
margin-top:10px;
}

/* PREVIEW */
.preview{
margin-top:8px;
max-width:100%;
border-radius:8px;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-box{
background:white;
padding:30px;
border-radius:14px;
text-align:center;
width:90%;
max-width:350px;
animation:fade .3s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div class="header">
<h2>Pendataan Warga RT 06</h2>
<p style="opacity:.8">Isi data dengan benar</p>
</div>

<div class="container">

<form id="form">

<!-- DATA RUMAH -->
<div class="card">
<div class="section-title">Data Rumah</div>

<input name="blok" placeholder="Blok" required>
<input name="noRumah" placeholder="Nomor Rumah" required>
<input name="alamat" placeholder="Alamat Lengkap" required>
<input name="kk" placeholder="Nomor KK" required>
<input type="number" name="kkKe" placeholder="KK ke berapa" required>

<label>Upload KK</label>
<input type="file" id="kkFile" required>
<img id="previewKK" class="preview">

</div>

<!-- ANGGOTA -->
<div class="card">
<div class="section-title">Anggota Keluarga</div>

<div id="anggotaContainer"></div>

<button type="button" class="btn btn-add" onclick="addAnggota()">+ Tambah Anggota</button>

</div>

<button class="btn">Kirim Data</button>

</form>

</div>

<!-- SUCCESS MODAL -->
<div id="successModal" class="modal">
<div class="modal-box">
<div style="font-size:40px;color:#0f766e">✔</div>
<h3>Berhasil</h3>
<p>Data berhasil dikirim</p>
<button onclick="location.reload()" class="btn">OK</button>
</div>
</div>

<!-- LOADING -->
<div id="loadingOverlay" class="modal">
<div class="modal-box">
<i class="fas fa-spinner fa-spin"></i>
<p>Mengirim data...</p>
</div>
</div>

<script>

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbx2v5mgcsoagSYbg0q3tj_k1Z5IXLEH68K9SeRmPIKgyl9LyZpkjTc_o_FNWLM_OLdj9w/exec";

let anggotaCount=0;

/* TAMBAH ANGGOTA */
function addAnggota(){
anggotaCount++;
const isKepala=anggotaCount===1;

document.getElementById("anggotaContainer").insertAdjacentHTML("beforeend",`
<div class="anggota">

<h4>${isKepala?"Kepala Keluarga":"Anggota "+anggotaCount}</h4>

<input class="nama" placeholder="Nama Lengkap" required>
<input class="nik" placeholder="NIK" required>

<select class="jk">
<option value="">Jenis Kelamin</option>
<option>Laki-Laki</option>
<option>Perempuan</option>
</select>

<input class="tempat" placeholder="Tempat Lahir">
<input type="date" class="tgl">

<input class="pekerjaan" placeholder="Pekerjaan">

<select class="hubungan">
<option value="">Hubungan Keluarga</option>
<option>Kepala Keluarga</option>
<option>Istri</option>
<option>Anak</option>
<option>Famili Lain</option>
</select>

<select class="pendidikan">
<option value="">Pendidikan</option>
<option>Tidak Sekolah</option>
<option>SD</option>
<option>SMP</option>
<option>SMA</option>
<option>D1</option>
<option>D2</option>
<option>D3</option>
<option>S1</option>
<option>S2</option>
<option>S3</option>
</select>

<select class="status">
<option value="">Status Perkawinan</option>
<option>Belum Kawin</option>
<option>Kawin Tercatat</option>
<option>Kawin Tidak Tercatat</option>
<option>Cerai Hidup</option>
<option>Cerai Mati</option>
</select>

<select class="agama">
<option value="">Agama</option>
<option>Islam</option>
<option>Kristen</option>
<option>Katolik</option>
<option>Hindu</option>
<option>Budha</option>
<option>Konghucu</option>
</select>

<select class="tinggal">
<option value="">Status Tinggal</option>
<option>Tetap</option>
<option>Kontrak</option>
<option>Numpang</option>
<option>Kost</option>
</select>

${isKepala?`<input class="hp" placeholder="No HP">`:""}

<label>Upload KTP</label>
<input type="file" class="ktp" onchange="previewKTP(this)">
<img class="preview">

</div>
`);
}

/* PREVIEW */
kkFile.onchange=e=>{
const r=new FileReader();
r.onload=()=>previewKK.src=r.result;
r.readAsDataURL(e.target.files[0]);
};

function previewKTP(input){
const file=input.files[0];
const img=input.nextElementSibling;
if(file){
const r=new FileReader();
r.onload=e=>img.src=e.target.result;
r.readAsDataURL(file);
}
}

/* SUBMIT */
form.onsubmit=async e=>{
e.preventDefault();

loadingOverlay.style.display="flex";

const f=e.target;

const base={
blok:f.blok.value,
noRumah:f.noRumah.value,
alamat:f.alamat.value,
kk:f.kk.value,
kkKe:f.kkKe.value,
kkFile:await toBase64(kkFile.files[0])
};

let data=[];

const anggota=document.querySelectorAll(".anggota");

for(let i=0;i<anggota.length;i++){
const el=anggota[i];

data.push({
...base,
anggotaKe:i+1,
nama:el.querySelector(".nama").value,
nik:el.querySelector(".nik").value,
jk:el.querySelector(".jk").value,
tempat:el.querySelector(".tempat").value,
tgl:el.querySelector(".tgl").value,
pekerjaan:el.querySelector(".pekerjaan").value,
hubungan:el.querySelector(".hubungan").value,
pendidikan:el.querySelector(".pendidikan").value,
status:el.querySelector(".status").value,
agama:el.querySelector(".agama").value,
tinggal:el.querySelector(".tinggal").value,
hp:i===0?el.querySelector(".hp").value:"",
ktp:await toBase64(el.querySelector(".ktp").files[0])
});
}

await fetch(WEB_APP_URL,{
method:"POST",
body:JSON.stringify(data)
});

loadingOverlay.style.display="none";
successModal.style.display="flex";
};

/* BASE64 */
function toBase64(file){
return new Promise(r=>{
if(!file) return r("");
const fr=new FileReader();
fr.onload=()=>r(fr.result.split(",")[1]);
fr.readAsDataURL(file);
});
}

/* INIT */
addAnggota();

</script>

</body>
</html>
