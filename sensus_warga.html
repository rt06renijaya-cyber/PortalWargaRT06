<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sensus Warga RT 06</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:'Poppins',sans-serif;
background:#f4f7fb;
color:#333;
}

/* HEADER */
.header{
background:linear-gradient(135deg,#00796B,#26A69A);
color:white;
padding:30px 20px;
text-align:center;
}
.header h1{font-size:22px}
.header p{font-size:14px;opacity:.9}

/* CARD */
.container{
max-width:700px;
margin:20px auto;
padding:15px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

/* FORM */
.form-group{margin-bottom:15px}
label{font-weight:600;font-size:13px;display:block;margin-bottom:5px}

input,select{
width:100%;
padding:11px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

input:focus,select:focus{
border-color:#00796B;
outline:none;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

@media(max-width:600px){
.grid{grid-template-columns:1fr}
}

/* ANGGOTA */
.anggota{
border:1px solid #eee;
padding:15px;
border-radius:10px;
margin-top:15px;
background:#fafafa;
}

.anggota-title{
font-weight:700;
margin-bottom:10px;
color:#00796B;
}

/* BUTTON */
.btn{
width:100%;
padding:14px;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

.btn-primary{background:#00796B;color:white}
.btn-add{background:#26A69A;color:white}
.btn-remove{background:#e53935;color:white}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:25px;
border-radius:12px;
text-align:center;
max-width:300px;
}
</style>
</head>

<body>

<div class="header">
<h1>Sensus Warga RT 06</h1>
<p>Input data per KK (lebih cepat & praktis)</p>
</div>

<div class="container">
<div class="card">

<!-- DATA RUMAH -->
<div class="form-group">
<label>Blok Rumah</label>
<input id="blok" required>
</div>

<div class="form-group">
<label>Nomor Rumah</label>
<input id="noRumah" required>
</div>

<div class="form-group">
<label>Alamat</label>
<input id="alamat" required>
</div>

<div class="form-group">
<label>Nomor KK</label>
<input id="kkGlobal" required>
</div>

<div class="form-group">
<label>Upload KK (1x saja)</label>
<input type="file" id="kkFile">
</div>

<!-- ANGGOTA -->
<div id="anggotaContainer"></div>

<button class="btn btn-add" onclick="addAnggota()">+ Tambah Anggota</button>

<button class="btn btn-primary" onclick="submitData()">Kirim Data</button>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>✅ Data Berhasil</h3>
<p>Data warga sudah tersimpan.</p>
<button class="btn btn-primary" onclick="closeModal()">OK</button>
</div>
</div>

<script>

let anggotaCount = 0;

function addAnggota(){

anggotaCount++;

const isKepala = anggotaCount === 1;

const html = `
<div class="anggota">
<div class="anggota-title">${isKepala ? 'Kepala Keluarga' : 'Anggota ' + anggotaCount}</div>

<div class="form-group">
<label>Nama</label>
<input class="nama">
</div>

<div class="form-group">
<label>NIK</label>
<input class="nik">
</div>

${isKepala ? `
<div class="form-group">
<label>No HP (Kepala Keluarga)</label>
<input class="hp">
</div>
` : ''}

<div class="grid">

<select class="jk">
<option>Laki-laki</option>
<option>Perempuan</option>
</select>

<select class="status">
<option>Belum Kawin</option>
<option>Kawin</option>
<option>Cerai</option>
</select>

<select class="agama">
<option>Islam</option>
<option>Kristen</option>
<option>Katolik</option>
<option>Hindu</option>
<option>Buddha</option>
<option>Konghucu</option>
</select>

<input type="text" class="tempat" placeholder="Tempat Lahir">
<input type="date" class="tgl">

<select class="pendidikan">
<option>SD</option>
<option>SMP</option>
<option>SMA</option>
<option>D3</option>
<option>S1</option>
</select>

<select class="hubungan">
<option>Kepala Keluarga</option>
<option>Istri</option>
<option>Anak</option>
<option>Lainnya</option>
</select>

<select class="tinggal">
<option>Milik Sendiri</option>
<option>Kontrak</option>
<option>Numpang</option>
</select>

</div>

<div class="form-group">
<label>Pekerjaan</label>
<input class="pekerjaan">
</div>

<div class="form-group">
<label>Upload KTP</label>
<input type="file" class="ktp">
</div>

<button class="btn btn-remove" onclick="this.parentElement.remove()">Hapus</button>

</div>
`;

document.getElementById('anggotaContainer').insertAdjacentHTML('beforeend', html);
}

/* SUBMIT */
function submitData(){

const blok = document.getElementById('blok').value;
const noRumah = document.getElementById('noRumah').value.padStart(3,'0');
const alamat = document.getElementById('alamat').value;
const kkGlobal = document.getElementById('kkGlobal').value;
const kkFile = document.getElementById('kkFile').files[0];

const anggota = document.querySelectorAll('.anggota');

let data = [];

anggota.forEach((el,i)=>{

const get = cls => el.querySelector(cls);

data.push({
blok,
noRumah,
alamat,
rt:"006",
kkKe:1,
anggotaKe:i+1,

nama:get('.nama').value,
nik:get('.nik').value,
kk: kkGlobal, // ✅ pakai KK global
hp: i===0 ? get('.hp')?.value : "",

jk:get('.jk').value,
status:get('.status').value,
agama:get('.agama').value,
tempat:get('.tempat').value,
tgl:get('.tgl').value,
pekerjaan:get('.pekerjaan').value,
hubungan:get('.hubungan').value,
pendidikan:get('.pendidikan').value,
tinggal:get('.tinggal').value
});

});

fetch("YOUR_WEB_APP_URL",{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(()=>{
document.getElementById('modal').style.display='flex';
});

}

function closeModal(){
document.getElementById('modal').style.display='none';
location.reload();
}

</script>

</body>
</html>
