<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sensus Warga RT 06</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#f4f7fb;margin:0}

/* HEADER */
.header{
background:linear-gradient(135deg,#00796B,#26A69A);
color:white;padding:30px;text-align:center;
}

/* CARD */
.container{max-width:700px;margin:auto;padding:15px}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,.08)}

/* FORM */
label{font-size:13px;font-weight:600}
input,select{
width:100%;padding:11px;margin-top:5px;margin-bottom:12px;
border:1px solid #ddd;border-radius:6px
}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.grid{grid-template-columns:1fr}}

/* ANGGOTA */
.anggota{
background:#fafafa;padding:15px;border-radius:10px;margin-top:15px
}

/* BUTTON */
button{
width:100%;padding:14px;border:none;border-radius:8px;
margin-top:10px;font-weight:600;cursor:pointer
}
.btn-add{background:#26A69A;color:white}
.btn-submit{background:#00796B;color:white}

/* PREVIEW */
.preview{
margin-top:5px;
text-align:center;
}
.preview img{
max-width:100%;
max-height:120px;
border-radius:6px;
margin-top:5px;
}

/* MODAL */
.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.6);
display:none;justify-content:center;align-items:center
}
.modal-box{
background:white;padding:25px;border-radius:12px;text-align:center
}

/* LOADING */
.loading{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.6);
display:none;justify-content:center;align-items:center;
color:white;font-size:18px;font-weight:600
}
</style>
</head>

<body>

<div class="header">
<h2>Sensus Warga RT 06</h2>
<p>Input data per KK</p>
</div>

<div class="container">
<div class="card">

<input id="blok" placeholder="Blok Rumah">
<input id="noRumah" placeholder="Nomor Rumah">
<input id="alamat" placeholder="Alamat">
<input id="kkGlobal" placeholder="Nomor KK">

<label>Upload KK</label>
<input type="file" id="kkFile" onchange="previewFile(this,'previewKK')">
<div class="preview" id="previewKK"></div>

<div id="anggota"></div>

<button class="btn-add" onclick="add()">+ Tambah Anggota</button>
<button class="btn-submit" onclick="submitData()">Kirim Data</button>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<h3>✅ Berhasil</h3>
<p>Data berhasil disimpan</p>
<button onclick="location.reload()">OK</button>
</div>
</div>

<!-- LOADING -->
<div class="loading" id="loading">Mengirim data...</div>

<script>

let count=0;

function add(){
count++;
let html=`
<div class="anggota">

<b>${count==1?'Kepala Keluarga':'Anggota '+count}</b>

<input class="nama" placeholder="Nama">
<input class="nik" placeholder="NIK">

${count==1?'<input class="hp" placeholder="No HP">':''}

<div class="grid">
<select class="jk"><option>Laki-laki</option><option>Perempuan</option></select>
<select class="status"><option>Kawin</option><option>Belum Kawin</option></select>
<select class="agama"><option>Islam</option><option>Kristen</option></select>
<input class="tempat" placeholder="Tempat Lahir">
<input type="date" class="tgl">
<select class="pendidikan"><option>SMA</option><option>S1</option></select>
<select class="hubungan"><option>Kepala</option><option>Anak</option></select>
<select class="tinggal"><option>Milik</option><option>Kontrak</option></select>
</div>

<input class="pekerjaan" placeholder="Pekerjaan">

<label>KTP</label>
<input type="file" class="ktp" onchange="previewFile(this,this.nextElementSibling)">
<div class="preview"></div>

</div>`;
document.getElementById('anggota').insertAdjacentHTML('beforeend',html);
}

/* PREVIEW */
function previewFile(input,target){
let file=input.files[0];
if(!file)return;

let reader=new FileReader();
reader.onload=e=>{
if(typeof target==="string"){
document.getElementById(target).innerHTML=`<img src="${e.target.result}">`;
}else{
target.innerHTML=`<img src="${e.target.result}">`;
}
}
reader.readAsDataURL(file);
}

/* BASE64 */
function toBase64(file){
return new Promise((res)=>{
let r=new FileReader();
r.onload=()=>res(r.result.split(',')[1]);
r.readAsDataURL(file);
});
}

/* SUBMIT */
async function submitData(){

let loading=document.getElementById('loading');
loading.style.display='flex';

try{

let blok=document.getElementById('blok').value;
let noRumah=document.getElementById('noRumah').value.padStart(3,'0');
let alamat=document.getElementById('alamat').value;
let kk=document.getElementById('kkGlobal').value;

let kkFile=document.getElementById('kkFile').files[0];
let kkBase64=kkFile?await toBase64(kkFile):"";

let anggota=document.querySelectorAll('.anggota');

let data=[];

for(let i=0;i<anggota.length;i++){

let el=anggota[i];

let ktpFile=el.querySelector('.ktp').files[0];
let ktpBase64=ktpFile?await toBase64(ktpFile):"";

data.push({
blok,
noRumah,
alamat,
rt:"006",
kkKe:1,
anggotaKe:i+1,

nama:el.querySelector('.nama').value,
nik:el.querySelector('.nik').value,
kk:kk,
hp:i==0?el.querySelector('.hp')?.value:"",

jk:el.querySelector('.jk').value,
status:el.querySelector('.status').value,
agama:el.querySelector('.agama').value,
tempat:el.querySelector('.tempat').value,
tgl:el.querySelector('.tgl').value,
pekerjaan:el.querySelector('.pekerjaan').value,
hubungan:el.querySelector('.hubungan').value,
pendidikan:el.querySelector('.pendidikan').value,
tinggal:el.querySelector('.tinggal').value,

ktp:ktpBase64,
kkFile:kkBase64
});
}

let res=await fetch("https://script.google.com/macros/s/AKfycbx2v5mgcsoagSYbg0q3tj_k1Z5IXLEH68K9SeRmPIKgyl9LyZpkjTc_o_FNWLM_OLdj9w/exec",{
method:"POST",
body:JSON.stringify(data)
});

let json=await res.json();

if(json.status==="success"){
document.getElementById('modal').style.display='flex';
}else{
alert("Error: "+json.message);
}

}catch(err){
alert("Gagal kirim: "+err);
}

loading.style.display='none';
}

</script>

</body>
</html>
